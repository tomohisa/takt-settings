name: review-only-and-merge
description: レビュー専用ピース - APPROVE なら PR をマージ、REJECT なら PR にコメントして失敗終了
piece_config:
  provider_options:
    codex:
      network_access: true
    opencode:
      network_access: true
max_movements: 12
initial_movement: plan
movements:
  - name: plan
    edit: false
    persona: planner
    allowed_tools:
      - Read
      - Glob
      - Grep
      - WebSearch
      - WebFetch
    rules:
      - condition: レビュー対象が明確
        next: reviewers
      - condition: ユーザーが質問をしている（レビュータスクではない）
        next: COMPLETE
      - condition: 要件が不明確、情報不足
        next: ABORT
        appendix: |
          確認事項:
          - {質問1}
          - {質問2}
    instruction_template: |
      ## Previous Response (superviseからの差し戻し時)
      {previous_response}

      レビュー依頼を分析し、レビュー方針を立ててください。

      **これはレビュー専用ピースです。** コード編集は行いません。
      以下に集中してください:
      1. レビュー対象のファイル/モジュールを特定
      2. レビューの重点領域を決定（アーキテクチャ、セキュリティ、AIパターン等）
      3. 依頼に記載された特定の懸念事項を整理

      **PR番号が記載されている場合**（例: "PR #42"）、レビュアーが
      PRの変更ファイルに集中できるよう計画に含めてください。

      **ユーザーがマージ条件やコメントに基づく指示を記載している場合**、
      その条件をレビュアーに伝わるよう計画に含めてください。

  - name: reviewers
    parallel:
      - name: arch-review
        edit: false
        persona: architecture-reviewer
        policy: review
        knowledge: architecture
        allowed_tools:
          - Read
          - Glob
          - Grep
          - WebSearch
          - WebFetch
        rules:
          - condition: approved
          - condition: needs_fix
        instruction: review-arch
        output_contracts:
          report:
            - name: 01-architect-review.md
              format: architecture-review
      - name: security-review
        edit: false
        persona: security-reviewer
        policy: review
        knowledge: security
        allowed_tools:
          - Read
          - Glob
          - Grep
          - WebSearch
          - WebFetch
        rules:
          - condition: approved
          - condition: needs_fix
        instruction: review-security
        output_contracts:
          report:
            - name: 02-security-review.md
              format: security-review
      - name: ai-review
        edit: false
        persona: ai-antipattern-reviewer
        policy:
          - review
          - ai-antipattern
        allowed_tools:
          - Read
          - Glob
          - Grep
          - WebSearch
          - WebFetch
        rules:
          - condition: approved
          - condition: needs_fix
        instruction: review-ai
        output_contracts:
          report:
            - name: 03-ai-review.md
              format: ai-review
    rules:
      - condition: all("approved")
        next: supervise
      - condition: any("needs_fix")
        next: supervise

  - name: supervise
    edit: false
    persona: supervisor
    policy: review
    allowed_tools:
      - Read
      - Glob
      - Grep
      - WebSearch
      - WebFetch
    pass_previous_response: false
    rules:
      - condition: approved
        next: merge-pr
      - condition: rejected
        next: reject-pr
    instruction_template: |
      ## レビュー結果
      {previous_response}

      **これはレビュー＋自動マージピースです。** テスト実行やビルドは行わないでください。
      レビュー結果を統合し、最終サマリーを作成する役割です。

      **やること:**
      1. Report Directory内の全レビューレポートを読む
      2. アーキテクチャ・セキュリティ・AIレビューの結果を統合
      3. 統合レビューサマリーと総合判定を作成
      4. ルーティング判断:
         - 全レビューで問題なし → `merge-pr` ムーブメントへ（condition: "approved"）
         - 重大な問題が見つかった場合 → `reject-pr` ムーブメントへ（condition: "rejected"）

      **ユーザーからの追加マージ条件がある場合（コメントや指示に記載）:**
      - その条件が満たされているかも確認すること
      - 条件未達成なら rejected として扱う

      **Review Summary出力契約:**
      ```markdown
      # レビューサマリー

      ## 総合判定: APPROVE / REJECT

      ## サマリー
      {2-3文で全レビュー結果を統合}

      ## レビュー結果
      | レビュー | 結果 | 主要な発見 |
      |---------|------|-----------|
      | アーキテクチャ | APPROVE/REJECT | {概要} |
      | セキュリティ | APPROVE/REJECT | {概要} |
      | AIアンチパターン | APPROVE/REJECT | {概要} |

      ## 要注意の問題
      | # | 重大度 | ソース | 場所 | 問題 |
      |---|--------|--------|------|------|
      | 1 | High | セキュリティ | `file:line` | 説明 |

      ## 改善提案
      - {全レビューからの統合提案}
      ```
    output_contracts:
      report:
        - name: review-summary.md
          format: |
            ```markdown
            # レビューサマリー

            ## 総合判定: APPROVE / REJECT

            ## サマリー
            {2-3文で全レビュー結果を統合}

            ## レビュー結果
            | レビュー | 結果 | 主要な発見 |
            |---------|------|-----------|
            | アーキテクチャ | APPROVE/REJECT | {概要} |
            | セキュリティ | APPROVE/REJECT | {概要} |
            | AIアンチパターン | APPROVE/REJECT | {概要} |

            ## 要注意の問題
            | # | 重大度 | ソース | 場所 | 問題 |
            |---|--------|--------|------|------|
            | 1 | High | セキュリティ | `file:line` | 説明 |

            ## 改善提案
            - {全レビューからの統合提案}
            ```

  - name: merge-pr
    edit: false
    persona: pr-commenter
    allowed_tools:
      - Read
      - Glob
      - Grep
      - Bash
    rules:
      - condition: マージ完了
        next: COMPLETE
      - condition: マージ失敗
        next: ABORT
    instruction_template: |
      ## レビューサマリー
      {previous_response}

      レビューで APPROVE 判定が出ました。PRにレビューサマリーをコメントし、マージしてください。

      **手順:**
      1. タスク説明からPR番号を抽出する
      2. Report Directory内の `review-summary.md` を読む
      3. PRにレビューサマリーをコメントとして投稿:
         ```
         gh pr comment <PR番号> --body "## ✅ 自動レビュー: APPROVE

         <review-summary.mdの内容を要約>

         ---
         *takt review-only-and-merge ピースで自動レビュー・マージ*"
         ```
      4. PRをスカッシュマージする:
         ```
         gh pr merge <PR番号> --squash --delete-branch
         ```
      5. マージが成功したら condition: "マージ完了" を選択
      6. マージが失敗したら condition: "マージ失敗" を選択（エラー内容を報告）

      **注意:**
      - `gh` コマンドが失敗した場合、エラーメッセージをそのまま報告する
      - マージコンフリクトがある場合は無理にマージしない
      - `--delete-branch` でマージ後のブランチを自動削除する

  - name: reject-pr
    edit: false
    persona: pr-commenter
    allowed_tools:
      - Read
      - Glob
      - Grep
      - Bash
    rules:
      - condition: コメント投稿完了
        next: ABORT
      - condition: コメント投稿失敗
        next: ABORT
    instruction_template: |
      ## レビューサマリー
      {previous_response}

      レビューで REJECT 判定が出ました。PRに問題点をコメントし、タスクを失敗終了させてください。

      **手順:**
      1. タスク説明からPR番号を抽出する
      2. Report Directory内の全レビューレポートを読む:
         - `01-architect-review.md`
         - `02-security-review.md`
         - `03-ai-review.md`
         - `review-summary.md`
      3. PRに詳細なレビュー結果をコメントとして投稿:
         ```
         gh pr comment <PR番号> --body "## ❌ 自動レビュー: REJECT

         ### 問題点
         <各レビューから Critical/High の問題を列挙>

         ### 修正が必要な箇所
         <具体的なファイル・行番号と修正案>

         ### 次のアクション
         以下のいずれかで対応してください:

         **修正して再レビュー:**
         \`\`\`
         takt run --piece review-fix-and-merge \"PR #<番号> のコメントを踏まえて修正してマージして\"
         \`\`\`

         **PRをクローズ:**
         \`\`\`
         takt run --piece close-pr \"PR #<番号> を閉じる。理由: ...\"
         \`\`\`

         ---
         *takt review-only-and-merge ピースで自動レビュー*"
         ```
      4. condition: "コメント投稿完了" を選択（ABORTでタスク失敗扱い）

      **注意:**
      - ABORT で終了することで、takt 側でタスク失敗として記録される
      - ユーザーはコメントを見て次のアクションを決定できる
