name: default-mini-auto-merge
description: Mini開発＋自動マージピース（plan → implement → 並列レビュー → 修正 → PR作成 → マージ）
piece_config:
  provider_options:
    codex:
      network_access: true
    opencode:
      network_access: true
max_movements: 25
initial_movement: plan
movements:
  - name: plan
    edit: false
    persona: planner
    knowledge: architecture
    allowed_tools:
      - Read
      - Glob
      - Grep
      - Bash
      - WebSearch
      - WebFetch
    rules:
      - condition: 要件が明確で実装可能
        next: implement
      - condition: ユーザーが質問をしている（実装タスクではない）
        next: COMPLETE
      - condition: 要件が不明確、情報不足
        next: ABORT
    instruction: plan
    output_contracts:
      report:
        - name: plan.md
          format: plan

  - name: implement
    edit: true
    persona: coder
    policy:
      - coding
      - testing
    knowledge: architecture
    allowed_tools:
      - Read
      - Glob
      - Grep
      - Edit
      - Write
      - Bash
      - WebSearch
      - WebFetch
    required_permission_mode: edit
    instruction: implement
    rules:
      - condition: 実装が完了した
        next: reviewers
      - condition: 実装を進行できない
        next: ABORT
      - condition: ユーザーへの確認事項があるためユーザー入力が必要
        next: implement
        requires_user_input: true
        interactive_only: true
    output_contracts:
      report:
        - name: coder-scope.md
          format: coder-scope
        - name: coder-decisions.md
          format: coder-decisions

  - name: reviewers
    parallel:
      - name: ai_review
        edit: false
        persona: ai-antipattern-reviewer
        policy:
          - review
          - ai-antipattern
        allowed_tools:
          - Read
          - Glob
          - Grep
          - WebSearch
          - WebFetch
        instruction: review-ai
        rules:
          - condition: AI特有の問題なし
          - condition: AI特有の問題あり
        output_contracts:
          report:
            - name: ai-review.md
              format: ai-review
      - name: supervise
        edit: false
        persona: supervisor
        policy: review
        knowledge: architecture
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Bash
          - WebSearch
          - WebFetch
        instruction: supervise
        rules:
          - condition: すべて問題なし
          - condition: 要求未達成、テスト失敗、ビルドエラー
        output_contracts:
          report:
            - name: supervisor-validation.md
              format: supervisor-validation
            - name: summary.md
              format: summary
              use_judge: false
    rules:
      - condition: all("AI特有の問題なし", "すべて問題なし")
        next: create-pr
      - condition: all("AI特有の問題あり", "要求未達成、テスト失敗、ビルドエラー")
        next: fix_both
      - condition: any("AI特有の問題あり")
        next: ai_fix
      - condition: any("要求未達成、テスト失敗、ビルドエラー")
        next: supervise_fix

  - name: fix_both
    parallel:
      - name: ai_fix_parallel
        edit: true
        persona: coder
        policy:
          - coding
          - testing
        knowledge: architecture
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Edit
          - Bash
          - WebSearch
          - WebFetch
        required_permission_mode: edit
        rules:
          - condition: AI問題の修正完了
          - condition: 修正不要（指摘対象ファイル/仕様の確認済み）
          - condition: 判断できない、情報不足
        instruction: ai-fix
      - name: supervise_fix_parallel
        edit: true
        persona: coder
        policy:
          - coding
          - testing
        knowledge: architecture
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Edit
          - Bash
          - WebSearch
          - WebFetch
        required_permission_mode: edit
        rules:
          - condition: 監督者の指摘に対する修正が完了した
          - condition: 修正を進行できない
        instruction: fix-supervisor
    rules:
      - condition: all("AI問題の修正完了", "監督者の指摘に対する修正が完了した")
        next: reviewers
      - condition: any("修正不要（指摘対象ファイル/仕様の確認済み）", "判断できない、情報不足", "修正を進行できない")
        next: implement

  - name: ai_fix
    edit: true
    persona: coder
    policy:
      - coding
      - testing
    knowledge: architecture
    allowed_tools:
      - Read
      - Glob
      - Grep
      - Edit
      - Write
      - Bash
      - WebSearch
      - WebFetch
    required_permission_mode: edit
    pass_previous_response: false
    rules:
      - condition: AI問題の修正完了
        next: reviewers
      - condition: 修正不要（指摘対象ファイル/仕様の確認済み）
        next: implement
      - condition: 判断できない、情報不足
        next: implement
    instruction: ai-fix

  - name: supervise_fix
    edit: true
    persona: coder
    policy:
      - coding
      - testing
    knowledge: architecture
    allowed_tools:
      - Read
      - Glob
      - Grep
      - Edit
      - Write
      - Bash
      - WebSearch
      - WebFetch
    required_permission_mode: edit
    pass_previous_response: false
    rules:
      - condition: 監督者の指摘に対する修正が完了した
        next: reviewers
      - condition: 修正を進行できない
        next: implement
    instruction: fix-supervisor

  - name: create-pr
    edit: false
    persona: pr-commenter
    allowed_tools:
      - Read
      - Glob
      - Grep
      - Bash
    required_permission_mode: edit
    rules:
      - condition: PR作成完了
        next: merge-pr
      - condition: PR作成失敗
        next: ABORT
    instruction_template: |
      ## レビューサマリー
      {previous_response}

      全レビューで APPROVE 判定が出ました。変更をコミットしてPRを作成してください。

      **重要: このリポジトリは git worktree 環境です。**
      `origin` リモートは設定済みです。`git remote -v` で確認できます。
      リモートが見えない場合でも、`git push origin HEAD` を直接実行してください。

      **手順（この順番で必ず実行してください）:**
      1. 現在のブランチ名を確認する:
         ```
         git branch --show-current
         ```
      2. リモートの存在を確認する:
         ```
         git remote -v
         ```
      3. コミットされていない変更がある場合のみコミットする:
         ```
         git add -A
         git diff --cached --quiet || git commit -m "<タスク内容を簡潔にまとめたコミットメッセージ>"
         ```
      4. リモートにプッシュする:
         ```
         git push origin HEAD
         ```
      5. PRを作成する:
         ```
         gh pr create --title "<タスク内容を簡潔にまとめたタイトル>" --body "## 概要

         <タスクの説明と変更内容の要約>

         ## レビュー結果
         - AI レビュー: ✅ APPROVE
         - Supervisor レビュー: ✅ APPROVE

         ---
         *takt default-mini-auto-merge ピースで自動作成*"
         ```
      6. PR作成が成功したら condition: "PR作成完了" を選択
      7. PR作成が失敗したら condition: "PR作成失敗" を選択（エラー内容を報告）

      **注意:**
      - 既にPRが存在する場合は、そのPR番号を使って次のステップに進む
      - コミットする変更がない場合でもpushとPR作成を試みる
      - PR番号を出力に含めること（次のマージステップで必要）
      - ワークツリーの構造を調査する必要はありません。上記手順を順番に実行してください

  - name: merge-pr
    edit: false
    persona: pr-commenter
    allowed_tools:
      - Read
      - Glob
      - Grep
      - Bash
    required_permission_mode: edit
    rules:
      - condition: マージ完了
        next: COMPLETE
      - condition: マージ失敗
        next: ABORT
    instruction_template: |
      ## レビューサマリー
      {previous_response}

      PRが作成されました。レビューサマリーをコメントし、マージしてください。

      **手順:**
      1. 前のステップの出力からPR番号を取得する
         PR番号が不明な場合:
         ```
         gh pr list --head $(git branch --show-current) --json number --jq '.[0].number'
         ```
      2. Report Directory内のレビューレポートを読む（存在するもの）:
         - `ai-review.md`
         - `supervisor-validation.md`
         - `summary.md`
      3. PRにレビューサマリーをコメントとして投稿:
         ```
         gh pr comment <PR番号> --body "## ✅ 自動レビュー: APPROVE

         <レビュー結果の要約>

         ---
         *takt default-mini-auto-merge ピースで自動レビュー・マージ*"
         ```
      4. PRをスカッシュマージする:
         ```
         gh pr merge <PR番号> --squash --delete-branch
         ```
      5. マージが成功したら condition: "マージ完了" を選択
      6. マージが失敗したら condition: "マージ失敗" を選択（エラー内容を報告）

      **注意:**
      - `gh` コマンドが失敗した場合、エラーメッセージをそのまま報告する
      - マージコンフリクトがある場合は無理にマージしない
      - `--delete-branch` でマージ後のブランチを自動削除する
