language: ja
default_piece: default
log_level: info
provider: claude
minimal_output: false
interactive_preview_movements: 3
concurrency: 1
prevent_sleep: true
auto_fetch: true
base_branch: main

# --- マルチプロバイダー設定 ---
# メイン: Claude (デフォルト)
# コーディング系: Codex
# 別視点レビュー: Copilot
persona_providers:
  # Codex (コーディング系)
  coder: codex
  architect-planner: codex
  security-reviewer: codex
  balthasar: codex
  test-planner:
    provider: codex
    model: spark
  frontend-reviewer:
    provider: codex
    model: spark
  pr-commenter:
    provider: codex
    model: spark
  research-digger:
    provider: codex
    model: spark
  # Copilot (別視点レビュー)
  ai-antipattern-reviewer: copilot
  qa-reviewer: copilot
  casper: copilot
