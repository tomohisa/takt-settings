language: ja
default_piece: default
log_level: info
provider: copilot
minimal_output: false
interactive_preview_movements: 3
concurrency: 1
prevent_sleep: true
auto_fetch: true
base_branch: main

# --- Copilot-only persona_providers (model differentiation) ---
# デフォルト (指定なし) → claude-sonnet-4.6 (Copilot CLIデフォルト)
# Codex系: コーディング → gpt-5.2-codex
# Speed系: 高速・低コスト → claude-haiku-4.5
# Alternative系: 異なる視点 → gemini-3-pro-preview
persona_providers:
  # --- 元の設定 (マルチプロバイダー) ---
  # coder: codex
  # architect-planner: codex
  # security-reviewer: codex
  # balthasar: codex
  # test-planner:
  #   provider: codex
  #   model: spark
  # frontend-reviewer:
  #   provider: codex
  #   model: spark
  # pr-commenter:
  #   provider: codex
  #   model: spark
  # research-digger:
  #   provider: codex
  #   model: spark
  # planner: claude
  # supervisor: claude
  # architecture-reviewer: claude
  # expert-supervisor: claude
  # research-planner: claude
  # research-supervisor: claude
  # melchior: claude
  # ai-antipattern-reviewer: opencode
  # qa-reviewer: opencode
  # casper: opencode
  # --- ここまで元の設定 ---
  # Codex系 (コーディング特化)
  coder:
    model: gpt-5.2-codex
  architect-planner:
    model: gpt-5.2-codex
  security-reviewer:
    model: gpt-5.2-codex
  balthasar:
    model: gpt-5.2-codex
  # Claude系 (推論・計画・監督) → 指定なし = claude-sonnet-4.6
  # planner, supervisor, architecture-reviewer, expert-supervisor,
  # research-planner, research-supervisor, melchior はデフォルトを使用
  # Speed系 (高速・低コスト)
  test-planner:
    model: claude-haiku-4.5
  frontend-reviewer:
    model: claude-haiku-4.5
  pr-commenter:
    model: claude-haiku-4.5
  research-digger:
    model: claude-haiku-4.5
  # Alternative系 (異なる視点)
  ai-antipattern-reviewer:
    model: gemini-3-pro-preview
  qa-reviewer:
    model: gemini-3-pro-preview
  casper:
    model: gemini-3-pro-preview
    model: gemini-3-pro-preview
  qa-reviewer:
    model: gemini-3-pro-preview
  casper:
    model: gemini-3-pro-preview
